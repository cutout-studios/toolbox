config_version = "0"

exclude_patterns = [
  "**/*.test.ts",
  "**/test.ts",
  "**/*.test.tsx",
  "**/test.tsx",
  "**/*.bench.ts",
  "**/bench.ts",
  "**/*.bench.tsx",
  "**/bench.tsx",
  "**/bench.html.tsx",
  "**/example.tsx",
]

[smells.function_complexity]
threshold = 20

[smells.boolean_logic]
threshold = 6

[smells.nested_control_flow]
threshold = 4

[smells.return_statements]
enabled = false
