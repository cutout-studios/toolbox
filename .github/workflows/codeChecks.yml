name: Code Checks

on: [push]

permissions:
  contents: read

jobs:
  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format
        run: deno fmt --check

      - name: Lint Code
        run: deno lint

      - name: Lint Docs
        run: deno task docs:lint

  unitTests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: style

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Tests
        run: |
          deno test --allow-all --coverage=.output/cov_profile
          mkdir -p .output/coverage
          deno coverage .output/cov_profile --lcov \
            --output=.output/coverage/lcov.info

      - name: Upload Coverage
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: .output/coverage/lcov.info

  bench:
    name: Bench
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Dependencies
        run: deno install

      - name: Run Benchmarks
        run: |
          deno bench --allow-all > bench.txt 2>&1 || true

          # Strip ANSI color codes
          sed 's/\x1b\[[0-9;]*m//g' bench.txt > bench.txt

          {
            echo "## Benchmark Results"
            echo '```'
            cat bench.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
